    <!-- The Typewriter Script -->
    <script>
        const textToType = "hello im Marisa feel free to contact me I am always open to collaborating on interesting projects or discussing new ideas Dont be shy!";
        const typingSpeed = 40; // Adjust this number to make it type faster or slower
        let charIndex = 0;
        const textElement = document.getElementById("text-content");

        function typeWriter() {
            if (charIndex < textToType.length) {
                textElement.innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, typingSpeed);
            }
        }

        // Wait a tiny bit after the page loads before starting to type
        setTimeout(typeWriter, 300);
    </script>
